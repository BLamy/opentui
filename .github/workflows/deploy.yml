name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy.yml
      - bun.lock
      - package.json
      - packages/core/**
      - packages/react/**
      - packages/solid/**
      - packages/web/**
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve Pages site settings
        id: pages-settings
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          repo="${GITHUB_REPOSITORY#*/}"

          echo "site_url=https://${owner}.github.io" >> "$GITHUB_OUTPUT"

          if [ "$repo" = "${owner}.github.io" ]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs site
        run: bun run --cwd packages/web build
        env:
          DOCS_SITE_URL: ${{ steps.pages-settings.outputs.site_url }}
          DOCS_BASE_PATH: ${{ steps.pages-settings.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
